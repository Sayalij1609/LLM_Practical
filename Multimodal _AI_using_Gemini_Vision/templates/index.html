<!DOCTYPE html>
<html>
<head>
    <title>Gemini Vision App</title>
</head>
<body style="font-family: Arial; text-align: center;">

    <h1>🧠 Multimodal AI - Gemini Vision</h1>
    <p>Upload an image and ask a question</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required><br><br>
        <input type="text" name="query" placeholder="Ask something..." required><br><br>
        <button type="submit">Generate Answer</button>
    </form>

    {% if image_path %}
        <h3>Uploaded Image:</h3>
        <img src="{{ image_path }}" width="300"><br><br>
    {% endif %}

    {% if answer %}
        <h3>Answer:</h3>
        <p>{{ answer }}</p>
    {% endif %}

</body>
</html>
